<!doctype html>
<html class="html-login no-js" lang="id">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="IE=edge">
  <link rel="icon" href="data:,"><title>Anugerah Group — Log In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" crossorigin="anonymous">
  <style>
    /* Gaya mendekati Oracle APEX Universal Theme 42 (halaman login), tanpa aset imgs00 */
    html, body { margin: 0; height: 100%; }
    html.html-login { -webkit-font-smoothing: antialiased; }
    body.t-PageBody--login {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 12px;
      color: #404040;
      background: #fff;
    }
    form#loginFlowForm {
      display: flex;
      min-height: 100vh;
      margin: 0;
    }
    .t-Body {
      margin-top: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      flex: 1;
      width: 100%;
      background: #fff;
    }
    .t-Body-wrap { margin: 12px 0; width: 100%; }
    .t-Login-container {
      position: relative;
      z-index: 100;
      max-width: 460px;
      margin: 0 auto;
      animation: loginFade 0.2s ease-in-out forwards;
    }
    @keyframes loginFade {
      from { transform: translateY(48px) scale(0.75); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
    .container { padding: 0 12px; box-sizing: border-box; }
    .row { display: block; }
    .col { width: 100%; }
    .t-Login-region {
      border-radius: 2px;
      box-shadow: 0 12px 16px 0 rgba(0,0,0,.2), 0 16px 48px 0 rgba(0,0,0,.15), 0 0 0 1px rgba(0,0,0,.05);
      overflow: hidden;
      padding: 36px;
      background-color: #fff;
    }
    .t-Login-brand {
      text-align: center;
      padding: 8px 0 24px;
    }
    .t-Login-title {
      font-size: 28px;
      font-weight: 300;
      line-height: 1.2;
      margin: 0;
      color: #404040;
      letter-spacing: 0.02em;
    }
    .t-Login-body .t-Form-fieldContainer { margin-bottom: 0; }
    .u-VisuallyHidden {
      position: absolute !important;
      width: 1px; height: 1px;
      overflow: hidden; clip: rect(1px,1px,1px,1px);
    }
    .t-Login-body .t-Form-inputContainer {
      padding-bottom: 16px;
      position: relative;
    }
    .t-Login-body .t-Form-inputContainer::before {
      position: absolute;
      left: 0;
      top: 0;
      font-family: FontAwesome;
      font-style: normal;
      font-weight: normal;
      z-index: 10;
      font-size: 28px;
      line-height: 48px;
      width: 40px;
      text-align: center;
      color: #2578cf;
      pointer-events: none;
    }
    .icon-login-username .t-Form-inputContainer::before { content: "\f007"; }
    .icon-login-password .t-Form-inputContainer::before { content: "\f023"; }
    .t-Login-region .t-Login-body input.text_field,
    .t-Login-region .t-Login-body input.password {
      box-sizing: border-box;
      width: 100%;
      font-size: 18px;
      padding: 11px 12px 11px 48px;
      height: 48px;
      line-height: 24px;
      border: 1px solid #d9d9d9;
      border-radius: 2px;
      background: #fff;
      color: #404040;
    }
    .t-Login-region .t-Login-body input::-webkit-input-placeholder {
      text-transform: lowercase;
      font-weight: 300;
      color: #a0a0a0;
    }
    .t-Login-region .t-Login-body input::placeholder {
      text-transform: lowercase;
      font-weight: 300;
      color: #a0a0a0;
    }
    .t-Login-body .checkbox_group {
      border: none;
      margin: 0 0 8px;
      padding: 0;
      font-size: 14px;
    }
    .t-Login-body .checkbox_group label { margin-left: 6px; cursor: pointer; }
    .t-Login-buttons { padding: 0; }
    .t-Login-links { margin-top: 8px; }
    .t-Button {
      box-sizing: border-box;
      cursor: pointer;
      display: block;
      width: 100%;
      margin: 0;
      text-align: center;
      font: inherit;
      border-radius: 2px;
      border: 1px solid #0572ce;
      background: #0572ce;
      color: #fff !important;
      padding: 16px 24px;
      font-size: 16px;
      line-height: 16px;
      font-weight: 700;
      -webkit-font-smoothing: antialiased;
    }
    .t-Button:hover { background: #045aa3; border-color: #045aa3; }
    .t-Button .t-Button-label { pointer-events: none; }
    #loginMsg {
      min-height: 1.2em;
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 2px;
      font-size: 14px;
      display: none;
    }
    #loginMsg.err {
      display: block;
      background: #fdecea;
      color: #c74634;
      border: 1px solid #f5c6c0;
    }
    #loginMsg.ok {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }
  </style>
</head>
<body class="t-PageBody--login no-anim apex-side-nav">
<form id="loginFlowForm" novalidate autocomplete="off">
  <div class="t-Body">
    <div class="t-Body-wrap">
      <div class="t-Login-container">
        <div class="container">
          <div class="row">
            <div class="col col-12">
              <div class="t-Login-region t-Form--stretchInputs t-Form--labelsAbove" role="group" aria-labelledby="kop_login_heading">
                <div id="kop_login_heading" class="t-Login-brand">
                  <h1 class="t-Login-title">Anugerah Group</h1>
                </div>
                <div id="loginMsg" role="alert"></div>
                <div class="t-Login-body">
                  <div class="t-Form-fieldContainer rel-col icon-login-username" id="P101_USERNAME_CONTAINER">
                    <div class="t-Form-labelContainer t-Form-labelContainer--hiddenLabel col col-null">
                      <label for="P101_USERNAME" class="t-Form-label u-VisuallyHidden">Username</label>
                    </div>
                    <div class="t-Form-inputContainer col col-null">
                      <input type="text" id="P101_USERNAME" name="user_id" class="text_field"
                             placeholder="username" maxlength="100" autocomplete="username" required>
                    </div>
                  </div>
                  <div class="t-Form-fieldContainer rel-col icon-login-password" id="P101_PASSWORD_CONTAINER">
                    <div class="t-Form-labelContainer t-Form-labelContainer--hiddenLabel col col-null">
                      <label for="P101_PASSWORD" class="t-Form-label u-VisuallyHidden">Password</label>
                    </div>
                    <div class="t-Form-inputContainer col col-null">
                      <input type="password" id="P101_PASSWORD" name="password" class="password"
                             placeholder="password" maxlength="100" autocomplete="current-password" required>
                    </div>
                  </div>
                  <div class="t-Form-fieldContainer rel-col" id="P101_REMEMBER_CONTAINER">
                    <div class="t-Form-inputContainer col col-null">
                      <fieldset class="checkbox_group" id="P101_REMEMBER">
                        <input type="checkbox" id="P101_REMEMBER_0" name="remember">
                        <label for="P101_REMEMBER_0">Remember username</label>
                      </fieldset>
                    </div>
                  </div>
                </div>
                <div class="t-Login-buttons"></div>
                <div class="t-Login-links">
                  <button type="submit" class="t-Button t-Button--hot t-Button--large t-Button--stretch" id="kopLoginBtn">
                    <span class="t-Button-label">Log In</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>
<script>
(function () {
  var LS_KEY = 'anugerah_login_username';
  var u = document.getElementById('P101_USERNAME');
  var p = document.getElementById('P101_PASSWORD');
  var chk = document.getElementById('P101_REMEMBER_0');
  try {
    var saved = localStorage.getItem(LS_KEY);
    if (saved) { u.value = saved; chk.checked = true; }
  } catch (e) {}
  document.getElementById('loginFlowForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    var msg = document.getElementById('loginMsg');
    msg.textContent = '';
    msg.className = '';
    msg.style.display = 'none';
    var body = { user_id: u.value.trim(), password: p.value };
    if (!body.user_id || !body.password) {
      msg.className = 'err';
      msg.textContent = 'Username dan password wajib diisi.';
      msg.style.display = 'block';
      return;
    }
    try {
      var r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        credentials: 'same-origin'
      });
      var j = await r.json().catch(function () { return {}; });
      if (j.ok) {
        try {
          if (chk.checked) localStorage.setItem(LS_KEY, body.user_id);
          else localStorage.removeItem(LS_KEY);
        } catch (err) {}
        msg.className = 'ok';
        msg.textContent = 'Berhasil. Mengalihkan…';
        msg.style.display = 'block';
        var redir = j.redirect || '/app';
        setTimeout(function () { window.location.href = redir; }, 500);
      } else {
        msg.className = 'err';
        msg.textContent = j.error || 'User atau password salah.';
        msg.style.display = 'block';
      }
    } catch (err) {
      msg.className = 'err';
      msg.textContent = 'Tidak dapat menghubungi server.';
      msg.style.display = 'block';
    }
  });
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { u.focus(); });
  } else { u.focus(); }
})();
</script>
</body>
</html>
