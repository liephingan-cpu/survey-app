<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="IE=edge">
  <title>Anugerah Group — Masuk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="/static/survey_redesign.css">
  <style>
    body { margin: 0; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f766e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-success { background: #d1fae5; color: #065f46; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; align-items: center; gap: 8px; }
    .login-success.show { display: flex; }
  </style>
</head>
<body>
<form id="loginForm" novalidate autocomplete="off">
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo"><i class="fas fa-clipboard-check"></i></div>
        <h2>Anugerah Group</h2>
        <p>Ceklist Kesiapan &amp; Pemeliharaan Kantor</p>
      </div>

      <div id="loginMsg" class="login-error"><i class="fas fa-exclamation-circle"></i> <span id="loginMsgText"></span></div>
      <div id="loginOk" class="login-success"><i class="fas fa-check-circle"></i> Berhasil. Mengalihkan…</div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="user_id" placeholder="Masukkan username" maxlength="100" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Masukkan password" maxlength="100" autocomplete="current-password" required>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Ingat username</label>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fas fa-arrow-right-to-bracket"></i> Masuk
      </button>

      <div class="login-footer">
        &copy; Anugerah Group — Survey System
      </div>
    </div>
  </div>
</form>

<script>
(function () {
  var LS_KEY = 'anugerah_login_username';
  var u = document.getElementById('username');
  var p = document.getElementById('password');
  var chk = document.getElementById('remember');
  var msg = document.getElementById('loginMsg');
  var msgText = document.getElementById('loginMsgText');
  var ok = document.getElementById('loginOk');
  var btn = document.getElementById('loginBtn');

  try {
    var saved = localStorage.getItem(LS_KEY);
    if (saved) { u.value = saved; chk.checked = true; }
  } catch (e) {}

  function showError(text) {
    msgText.textContent = text;
    msg.classList.add('show');
    ok.classList.remove('show');
  }

  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    msg.classList.remove('show');
    ok.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses…';

    var body = { user_id: u.value.trim(), password: p.value };
    if (!body.user_id || !body.password) {
      showError('Username dan password wajib diisi.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Masuk';
      return;
    }

    try {
      var r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        credentials: 'same-origin'
      });
      var j = await r.json().catch(function () { return {}; });
      if (j.status === 'sukses') {
        try {
          if (chk.checked) localStorage.setItem(LS_KEY, body.user_id);
          else localStorage.removeItem(LS_KEY);
        } catch (err) {}
        ok.classList.add('show');
        var redir = j.redirect || '/app';
        setTimeout(function () { window.location.href = redir; }, 500);
      } else {
        showError(j.pesan || 'User atau password salah.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Masuk';
      }
    } catch (err) {
      showError('Tidak dapat menghubungi server.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Masuk';
    }
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { u.focus(); });
  } else { u.focus(); }
})();
</script>
</body>
</html>
